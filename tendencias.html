<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tendências — NetWatch</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
    <a class="nav-logo" href="index.html">NetWatch</a>
    <ul class="nav-links">
        <li><a href="index.html">Filmes</a></li>
        <li><a href="series.html">Séries</a></li>
        <li><a href="tendencias.html">Tendências</a></li>
        <li><a href="busca.html">Buscar</a></li>
    </ul>
</nav>

<div class="tab-bar">
    <button class="tab-btn active" data-value="all">Tudo</button>
    <button class="tab-btn" data-value="movie">Filmes</button>
    <button class="tab-btn" data-value="tv">Séries</button>
    <div style="flex:1"></div>
    <button class="tab-btn active" id="tab-day" data-window="day">Hoje</button>
    <button class="tab-btn" id="tab-week" data-window="week">Esta Semana</button>
</div>

<section class="section" style="padding-top:1.8rem">
    <h2 class="section-title">📈 Em Alta</h2>
    <div id="status">Carregando...</div>
    <div id="grid" class="grid"></div>
</section>

<!-- Modal -->
<div id="modal-overlay" onclick="fecharModal(event)">
    <div id="modal">
        <button id="modal-close" onclick="fecharModal()">✕</button>
        <img id="modal-img" src="" alt="">
        <div class="modal-body">
            <h2></h2>
            <div class="modal-meta" id="modal-meta"></div>
            <p id="modal-overview"></p>
            <div class="modal-actions">
                <a id="modal-detalhes-btn" href="#" class="btn-primary">Ver Detalhes</a>
            </div>
        </div>
    </div>
</div>

<footer>
    <p>© 2025 NetWatch &mdash; Dados fornecidos por TMDB</p>
</footer>

<script src="js/api.js"></script>
<script src="js/main.js"></script>
<script>
    let tipoAtivo   = 'all';
    let windowAtivo = 'day';

    async function carregar() {
        mostrarSpinner();
        $('grid').innerHTML = '';

        let data;
        if (tipoAtivo === 'all')   data = await getTrendingAll(windowAtivo);
        if (tipoAtivo === 'movie') data = await getTrendingMovies(windowAtivo);
        if (tipoAtivo === 'tv')    data = await getTrendingTV(windowAtivo);

        ocultarStatus();
        renderizarGrid(data.results, 'grid');
    }

    // Tabs tipo
    initTabs(valor => {
        tipoAtivo = valor;
        carregar();
    });

    // Tabs janela (dia/semana) — customizadas separadamente
    document.querySelectorAll('[data-window]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('[data-window]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            windowAtivo = btn.dataset.window;
            carregar();
        });
    });

    carregar();
</script>
</body>
</html>
